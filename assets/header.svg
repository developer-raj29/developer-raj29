<svg xmlns="http://www.w3.org/2000/svg" width="950" height="380" viewBox="0 0 950 380" fill="none">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Card Border Gradient -->
    <linearGradient id="border-gradient" x1="0" y1="0" x2="950" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D33FA" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C324EB" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Text Gradient for 'Raj Yadav' -->
    <linearGradient id="text-gradient" x1="60" y1="90" x2="350" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#C324EB"/>
    </linearGradient>

    <!-- Glowing Background Radial Gradient -->
    <radialGradient id="glow-gradient" cx="700" cy="190" r="250" fx="700" fy="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D33FA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#050811" stop-opacity="0"/>
    </radialGradient>

    <!-- Clipping path for profile image to make it fit beautifully -->
    <clipPath id="profile-clip">
      <rect x="520" y="20" width="370" height="340" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background Base Card -->
  <rect x="1" y="1" width="948" height="378" rx="16" fill="#0A0E1A"/>
  <rect x="1" y="1" width="948" height="378" rx="16" stroke="url(#border-gradient)" stroke-width="2"/>

  <!-- Radial Glow Behind Photo -->
  <circle cx="700" cy="190" r="250" fill="url(#glow-gradient)"/>

  <!-- Left Side content (Text and Buttons) -->
  <g transform="translate(60, 50)">
    <!-- Subtitle -->
    <text x="0" y="30" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" letter-spacing="0.5">Hey, 👋 I'm</text>
    
    <!-- Title -->
    <text x="0" y="90" fill="url(#text-gradient)" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="1">Raj Yadav</text>
    
    <!-- Description -->
    <text x="0" y="145" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" letter-spacing="0.2">Full Stack Developer &amp;</text>
    <text x="0" y="175" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" letter-spacing="0.2">Software Development Engineer</text>
    <text x="0" y="205" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" letter-spacing="0.2">from India 🇮🇳</text>

    <!-- Portfolio Button link simulation -->
    <g transform="translate(0, 250)">
      <!-- Button border/bg -->
      <rect x="0" y="0" width="170" height="42" rx="21" fill="none" stroke="#C324EB" stroke-width="2"/>
      <!-- Arrow and Text -->
      <text x="25" y="26" fill="#C324EB" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">My Portfolio</text>
      <!-- Arrow SVG icon inline -->
      <path d="M125 16L133 21L125 26" stroke="#C324EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M117 21H132" stroke="#C324EB" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Emojis next to button -->
      <text x="195" y="28" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="26">😎 😎</text>
    </g>
  </g>

  <!-- Right Side content (Profile Image) -->
  <!-- We reference the local hero.png directly -->
  <image href="hero.png" x="520" y="20" width="370" height="340" preserveAspectRatio="xMidYMid slice" clip-path="url(#profile-clip)"/>
</svg>
