<svg xmlns="http://www.w3.org/2000/svg" width="600" height="60" viewBox="0 0 600 60" fill="none">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="footer-border" x1="0" y1="0" x2="600" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D33FA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Card Background and Border -->
  <rect x="1" y="1" width="598" height="58" rx="10" fill="#0A0E1A"/>
  <rect x="1" y="1" width="598" height="58" rx="10" stroke="url(#footer-border)" stroke-width="1.5"/>

  <!-- Text and Emojis -->
  <g transform="translate(20, 36)">
    <!-- Eye icon simulated in SVG -->
    <circle cx="10" cy="-6" r="6" stroke="#94A3B8" stroke-width="2" fill="none"/>
    <circle cx="10" cy="-6" r="2.5" fill="#38BDF8"/>
    
    <text x="28" y="0" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="0.2">
      Thanks for visiting! Don't forget to <tspan fill="#F59E0B">⭐</tspan> some repositories!
    </text>
  </g>
</svg>
